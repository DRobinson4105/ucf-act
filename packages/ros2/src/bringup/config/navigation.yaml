planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 1.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      tolerance: 1.5
      allow_unknown: false
      downsample_costmap: false
      downsampling_factor: 1
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      terminal_checking_interval: 5000
      max_planning_time: 1.0
      motion_model_for_search: "DUBIN"
      cost_travel_multiplier: 3.0
      angle_quantization_bins: 64
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 10.0
      analytic_expansion_max_cost: 200
      analytic_expansion_max_cost_override: false
      minimum_turning_radius: 2.8
      reverse_penalty: 2.1
      change_penalty: 0.0
      non_straight_penalty: 1.2
      cost_penalty: 3.0
      retrospective_penalty: 0.025
      lookup_table_size: 20.0
      cache_obstacle_heuristic: true
      smooth_path: true
      debug_visualizations: false
      smoother:
        max_iterations: 500
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10
        do_refinement: true

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 25.0
    odom_topic: /odometry/local
    enable_stamped_cmd_vel: false
    speed_limit_topic: /speed_limit

    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.25
      movement_time_allowance: 75.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.5
      yaw_goal_tolerance: 0.5
      stateful: true

    controller_plugins: ["FollowPath"]

    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      motion_model: "Ackermann"

      AckermannConstraints:
        min_turning_r: 2.8

      model_dt: 0.04
      time_steps: 25
      iteration_count: 1
      batch_size: 300

      prune_distance: 1.7
      transform_tolerance: 0.2

      temperature: 0.3
      gamma: 0.015

      vx_max: 3.58
      vx_min: 0.0
      wz_max: 1.28

      visualize: true
      publish_optimal_trajectory: true

      critics:
        - ConstraintCritic
        - CostCritic
        - PathFollowCritic
        - GoalCritic

      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0

      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 12.0
        critical_cost: 150.0
        collision_cost: 1000000.0
        consider_footprint: true

      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 2.0
        offset_from_furthest: 5

      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 2.0

global_costmap:
  global_costmap:
    ros__parameters:
      track_unknown_space: false
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 100
      height: 100
      resolution: 0.1
      update_frequency: 5.0
      publish_frequency: 2.0
      footprint_padding: 0.15
      footprint: "[[1.9304, 0.5842], [1.9304, -0.5842], [-0.8382, -0.5842], [-0.8382, 0.5842]]"
      plugins: ["stvl_layer", "inflation_layer"]

      stvl_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled: true
        voxel_decay: 1.0
        decay_model: 0
        voxel_size: 0.1
        track_unknown_space: false
        unknown_threshold: 15
        mark_threshold: 0
        update_footprint_enabled: true
        combination_method: 1
        origin_z: 0.0
        publish_voxel_map: false
        transform_tolerance: 1.0
        mapping_mode: false
        observation_sources: front_right_seg

        livox:
          topic: "/livox/lidar_filtered"
          sensor_frame: "livox_frame"
          data_type: "PointCloud2"
          marking: true
          clearing: true
          obstacle_range: 50.0
          max_obstacle_height: 1.8
          min_obstacle_height: 0.6
          filter: "voxel"
          remind: false
          max_z: 2.0
          min_z: 0.1
          voxel_min_points: 2

        front_left_seg:
          topic: "/front_left/seg_pc2"
          sensor_frame: "front_left"
          data_type: "PointCloud2"
          marking: true
          clearing: true
          obstacle_range: 50.0
          filter: "voxel"
          voxel_min_points: 1

        front_right_seg:
          topic: "/front_right/seg_pc2"
          sensor_frame: "front_right"
          data_type: "PointCloud2"
          marking: true
          clearing: true
          obstacle_range: 50.0
          filter: "voxel"
          voxel_min_points: 1

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 2.2
        cost_scaling_factor: 1.0

local_costmap:
  local_costmap:
    ros__parameters:
      track_unknown_space: true
      global_frame: odom
      robot_base_frame: base_link
      update_frequency: 10.0
      publish_frequency: 5.0
      resolution: 0.05
      rolling_window: true
      width: 40
      height: 40
      plugins: ["stvl_layer", "inflation_layer"]
      footprint_padding: 0.1
      footprint: "[[1.9304, 0.5842], [1.9304, -0.5842], [-0.8382, -0.5842], [-0.8382, 0.5842]]"

      stvl_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled: true
        voxel_decay: 1.0
        decay_model: 0
        voxel_size: 0.05
        track_unknown_space: false
        unknown_threshold: 15
        mark_threshold: 0
        update_footprint_enabled: true
        combination_method: 1
        origin_z: 0.0
        publish_voxel_map: true
        transform_tolerance: 1.0
        mapping_mode: false
        observation_sources: front_right_seg

        livox:
          topic: "/livox/lidar_filtered"
          sensor_frame: "livox_frame"
          data_type: "PointCloud2"
          marking: true
          clearing: false
          obstacle_range: 50.0
          max_obstacle_height: 1.8
          min_obstacle_height: 0.6
          filter: "voxel"
          remind: false
          max_z: 2.0
          min_z: 0.1
          voxel_min_points: 2

        front_left_seg:
          topic: "/front_left/seg_pc2"
          sensor_frame: "front_left"
          data_type: "PointCloud2"
          marking: true
          clearing: false
          obstacle_range: 50.0
          filter: "voxel"
          max_obstacle_height: 1.8
          min_obstacle_height: 0.6
          voxel_min_points: 1

        front_right_seg:
          topic: "/front_right/seg_pc2"
          sensor_frame: "front_right"
          data_type: "PointCloud2"
          marking: true
          clearing: false
          obstacle_range: 50.0
          max_obstacle_height: 1.8
          min_obstacle_height: 0.6
          filter: "voxel"
          voxel_min_points: 1

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 2.2
        cost_scaling_factor: 1.0

lifecycle_manager:
  ros__parameters:
    use_sim_time: false
    autostart: true
    bond_timeout: 10.0
    node_names:
      - controller_server
      - planner_server
